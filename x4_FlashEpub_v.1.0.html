<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashEPUB — Xteink X4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root {
  --bg:#0a0a0f; --card:#16161f; --border:#2a2a3a;
  --accent:#7c6af7; --accent3:#6af7c4;
  --text:#e8e8f0; --muted:#6b6b80; --surface:#111118;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(124,106,247,.12) 0%,transparent 60%),
             radial-gradient(ellipse 50% 60% at 85% 80%,rgba(247,106,138,.08) 0%,transparent 60%);}
.wrap{max-width:960px;margin:0 auto;padding:52px 24px 80px;position:relative;z-index:1;}

/* header */
.hdr{text-align:center;margin-bottom:44px;}
.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:12px;}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#f76a8a);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(90deg,var(--accent),#f76a8a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tagline{font-size:13px;color:var(--muted);}

/* section */
.box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px 28px;margin-bottom:16px;}
.lbl{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}

/* format badges */
.fmts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.fmt{padding:5px 12px;border-radius:100px;border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);}
.fmt.csv{border-color:rgba(124,106,247,.4);color:#a99cf8;}
.fmt.xlsx{border-color:rgba(74,222,128,.4);color:#86efac;}
.fmt.txt{border-color:rgba(251,191,36,.4);color:#fde68a;}
.fmt.apkg{border-color:rgba(247,106,138,.4);color:#fca5a5;}

/* drop */
.drop{border:2px dashed var(--border);border-radius:10px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.drop:hover,.drop.over{border-color:var(--accent);background:rgba(124,106,247,.05);}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.drop-icon{font-size:30px;margin-bottom:8px;}
.drop-main{font-size:14px;font-weight:500;margin-bottom:4px;}
.drop-sub{font-size:12px;color:var(--muted);}
.drop-name{margin-top:10px;font-size:12px;color:var(--accent3);display:none;}

/* fields */
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:16px;}
@media(max-width:600px){.grid{grid-template-columns:1fr 1fr;}}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.field input,.field select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field select option{background:var(--surface);}

/* error */
.err{display:none;background:rgba(247,106,138,.1);border:1px solid rgba(247,106,138,.3);color:#f76a8a;border-radius:8px;padding:10px 14px;font-size:12px;margin-top:12px;}

/* preview layout */
.preview-wrap{display:none;gap:16px;margin-bottom:16px;}
.preview-wrap.on{display:grid;grid-template-columns:1fr 220px;}
@media(max-width:720px){.preview-wrap.on{grid-template-columns:1fr;}}

/* table */
.tbl-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;overflow:hidden;}
.tbl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.badge{background:rgba(124,106,247,.2);color:var(--accent);padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--surface);padding:8px 12px;text-align:left;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
td{padding:8px 12px;border-bottom:1px solid rgba(42,42,58,.5);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(124,106,247,.05);}
tr.sel td{background:rgba(124,106,247,.14);}
.rn{color:var(--muted);}

/* ── X4 preview: plain text box, no styling gimmicks ── */
.x4-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
.x4-title{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}

/* The screen: white bg, monospace — mimics X4 rendering */
.x4-screen{
  background:#fff;
  border:2px solid #222;
  border-radius:4px;
  aspect-ratio:3/5;
  width:100%;
  overflow:hidden;
  padding:8px 8px;
  font-family:'Courier New',Courier,monospace;
  font-size:11px;
  color:#111;
  line-height:1.7;
  word-break:keep-all;
  white-space:nowrap;
  display:flex;
  flex-direction:column;
}
.x4-content{flex:1;overflow:hidden;white-space:nowrap;}

/* controls */
.x4-ctrl{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:6px;}
.x4-btn{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:11px;cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.x4-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.x4-btn:disabled{opacity:.3;cursor:not-allowed;}
.x4-btn.flip{border-color:rgba(124,106,247,.4);color:var(--accent);}
.x4-pos{font-size:11px;color:var(--muted);}

/* convert */
.cvt-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#9b6af7);border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;}
.cvt-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 32px rgba(124,106,247,.4);}
.cvt-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.prog-bar{height:3px;background:var(--border);border-radius:100px;overflow:hidden;display:none;margin-bottom:6px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#f76a8a);border-radius:100px;width:0%;transition:width .3s;}
.status{font-size:11px;color:var(--muted);text-align:center;min-height:16px;}

/* success */
.ok-box{display:none;background:rgba(106,247,196,.07);border:1px solid rgba(106,247,196,.28);border-radius:14px;padding:24px;text-align:center;margin-bottom:16px;}
.ok-icon{font-size:34px;margin-bottom:8px;display:block;}
.ok-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--accent3);margin-bottom:4px;}
.ok-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.dl-btn{display:inline-flex;align-items:center;gap:6px;padding:11px 24px;background:var(--accent3);color:#081a10;border-radius:9px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;}
.dl-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(106,247,196,.3);}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:12px;z-index:999;transform:translateY(60px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.toast.on{transform:translateY(0);opacity:1;}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.box,.cvt-btn{animation:up .6s ease both;}
</style>
</head>
<body>
<div class="wrap">

<header class="hdr">
  <div class="logo">
    <div class="logo-icon">📚</div>
    <span class="logo-text">FlashEPUB</span>
  </div>
  <p class="tagline">CSV · XLSX · TXT · APKG → Xteink X4 플래시카드 EPUB</p>
</header>

<!-- Upload -->
<div class="box">
  <div class="lbl">파일 업로드</div>
  <div class="fmts">
    <span class="fmt csv">CSV</span>
    <span class="fmt xlsx">XLSX / XLS</span>
    <span class="fmt txt">TXT</span>
  </div>
  <div class="drop" id="drop">
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.txt">
    <div class="drop-icon">🗂️</div>
    <div class="drop-main">파일을 드래그하거나 클릭해서 선택</div>
    <div class="drop-sub">CSV · XLSX · TXT</div>
    <div class="drop-name" id="dropName"></div>
  </div>
  <div class="err" id="err"></div>
  <div class="grid" id="colSettings">
    <div class="field"><label>질문 컬럼명 / 열 번호</label><input id="qCol" value="question" placeholder="question 또는 1"><span style="font-size:10px;color:var(--muted);margin-top:2px;">헤더명 또는 열 번호(1부터)</span></div>
    <div class="field"><label>정답 컬럼명 / 열 번호</label><input id="aCol" value="answer" placeholder="answer 또는 2"></div>
    <div class="field"><label>힌트 컬럼 (선택)</label><input id="hCol" value="hint" placeholder="없으면 비워두세요"></div>
    <div class="field"><label>책 제목</label><input id="bookTitle" value="플래시카드 학습"></div>
    <div class="field"><label>저자명</label><input id="bookAuthor" value="FlashEPUB"></div>
    <div class="field"><label>구분선</label>
      <select id="divStyle">
        <option value="dot">....</option>
        <option value="dash">----</option>
        <option value="eq">====</option>
      </select>
    </div>
  </div>
</div>

<!-- Preview -->
<div class="preview-wrap" id="previewWrap">
  <div class="tbl-box">
    <div class="tbl-head">
      <div class="lbl" style="margin:0">카드 목록</div>
      <span class="badge" id="cardBadge">0개</span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>#</th><th>질문</th><th>정답</th><th>힌트</th></tr></thead>
        <tbody id="tblBody"></tbody>
      </table>
    </div>
  </div>

  <div class="x4-box">
    <div class="x4-title">🖥 X4 미리보기</div>
    <!-- Unified preview: cover (page 0) + cards -->
    <canvas id="coverCanvas" style="display:none;width:100%;aspect-ratio:3/5;border:2px solid #222;border-radius:4px;"></canvas>
    <div class="x4-screen" id="x4Screen">
      <div class="x4-content" id="x4Content">카드를 선택하세요</div>
    </div>
    <div class="x4-ctrl">
      <button class="x4-btn" id="prevBtn" onclick="navCard(-1)" disabled>←</button>
      <button class="x4-btn flip" id="flipBtn" onclick="flipCard()" disabled>뒤집기</button>
      <span class="x4-pos" id="cardPos">— / —</span>
      <button class="x4-btn" id="nextBtn" onclick="navCard(1)" disabled>다음 →</button>
    </div>
  </div>
</div>

<!-- Convert -->
<button class="cvt-btn" id="cvtBtn" disabled><span>✦</span><span>X4용 EPUB 생성</span></button>
<div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill"></div></div>
<div class="status" id="status"></div>

<div class="ok-box" id="okBox">
  <span class="ok-icon">🎉</span>
  <div class="ok-title">변환 완료!</div>
  <div class="ok-sub" id="okSub"></div>
  <button class="dl-btn" id="dlBtn">⬇ EPUB 다운로드</button>
</div>

</div><!-- /wrap -->
<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
let cards=[], blob=null, idx=0, side='q';

/* ── toast ── */
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2600);}
function err(msg){$('err').style.display='block';$('err').textContent='⚠ '+msg;}
function clearErr(){$('err').style.display='none';}
function prog(pct,msg){$('progFill').style.width=pct+'%';$('status').textContent=msg;}

/* ── drag & drop ── */
const drop=$('drop');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over');});
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);});
$('fileInput').addEventListener('change',e=>{if(e.target.files[0])load(e.target.files[0]);});

async function load(file){
  clearErr();
  $('dropName').style.display='block';
  $('dropName').textContent='📄 '+file.name;
  const n=file.name.toLowerCase();
  try{
    if(n.endsWith('.csv'))                          await parseCSV(file);
    else if(n.endsWith('.xlsx')||n.endsWith('.xls'))await parseXLSX(file);
    else if(n.endsWith('.txt'))                     await parseTXT(file);
    else if(n.endsWith('.apkg'))                    await parseAPKG(file);
    else err('지원하지 않는 형식입니다.');
  }catch(e){err('파싱 오류: '+e.message);}
}

/* ── parsers ── */
function resolveCol(headers,val,fallback){
  val=(val||'').trim();
  if(!val)return fallback;
  if(/^\d+$/.test(val))return parseInt(val)-1;
  const i=headers.findIndex(h=>h.toLowerCase()===val.toLowerCase());
  return i>=0?i:fallback;
}
function csvLine(line){
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++;}else q=!q;}
    else if(ch===','&&!q){r.push(c);c='';}
    else c+=ch;
  }
  r.push(c);return r;
}
function readText(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(f,'UTF-8');});}
function readBuf(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsArrayBuffer(f);});}
function loadScript(src){return new Promise((res,rej)=>{if(document.querySelector(`script[src="${src}"]`)){res();return;}const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
function stripHtml(h){const d=document.createElement('div');d.innerHTML=h.replace(/<br\s*\/?>/gi,'\n');return d.textContent||d.innerText||'';}

async function parseCSV(file){
  const text=await readText(file);
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2){err('데이터 부족');return;}
  const hdrs=csvLine(lines[0]);
  const qi=resolveCol(hdrs,$('qCol').value,0);
  const ai=resolveCol(hdrs,$('aCol').value,1);
  const hv=$('hCol').value.trim();
  const hi=hv?resolveCol(hdrs,hv,-1):-1;
  if(qi<0){err('질문 컬럼 없음. 헤더: '+hdrs.join(', '));return;}
  if(ai<0){err('정답 컬럼 없음. 헤더: '+hdrs.join(', '));return;}
  const out=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const c=csvLine(lines[i]);
    const q=(c[qi]||'').trim(),a=(c[ai]||'').trim();
    if(!q&&!a)continue;
    out.push({q,a,hint:hi>=0?(c[hi]||'').trim():''});
  }
  finish(out,'CSV');
}

async function parseXLSX(file){
  const buf=await readBuf(file);
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(rows.length<2){err('데이터 부족');return;}
  const hdrs=rows[0].map(String);
  const qi=resolveCol(hdrs,$('qCol').value,0);
  const ai=resolveCol(hdrs,$('aCol').value,1);
  const hv=$('hCol').value.trim();
  const hi=hv?resolveCol(hdrs,hv,-1):-1;
  if(qi<0){err('질문 컬럼 없음');return;}
  if(ai<0){err('정답 컬럼 없음');return;}
  const out=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const q=String(r[qi]||'').trim(),a=String(r[ai]||'').trim();
    if(!q&&!a)continue;
    out.push({q,a,hint:hi>=0?String(r[hi]||'').trim():''});
  }
  finish(out,'XLSX');
}

async function parseTXT(file){
  const text=await readText(file);
  const lines=text.trim().split(/\r?\n/);
  if(!lines.length){err('내용 없음');return;}
  const delim=lines[0].includes('\t')?'\t':lines[0].includes('|')?'|':',';
  const qRaw=$('qCol').value.trim();
  const hasHdr=isNaN(Number(qRaw))&&lines.length>1;
  let start=0,hdrs=[];
  if(hasHdr){hdrs=lines[0].split(delim).map(s=>s.trim());start=1;}
  const qi=hasHdr?resolveCol(hdrs,qRaw,0):(parseInt(qRaw)||1)-1;
  const ai=hasHdr?resolveCol(hdrs,$('aCol').value,1):(parseInt($('aCol').value)||2)-1;
  const hv=$('hCol').value.trim();
  const hi=hv?(hasHdr?resolveCol(hdrs,hv,-1):(parseInt(hv)||0)-1):-1;
  const out=[];
  for(let i=start;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const p=lines[i].split(delim);
    const q=(p[qi]||'').trim(),a=(p[ai]||'').trim();
    if(!q&&!a)continue;
    out.push({q,a,hint:hi>=0?(p[hi]||'').trim():''});
  }
  finish(out,'TXT');
}

async function parseAPKG(file){
  $('colSettings').style.display='none';

  // Load sql.js
  try{await loadScript('https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.min.js');}
  catch(e){err('sql.js 로드 실패');$('colSettings').style.display='';return;}

  const buf=await readBuf(file);
  let zip;
  try{zip=await JSZip.loadAsync(buf);}catch(e){err('ZIP 오류');$('colSettings').style.display='';return;}

  // Anki 2.1.50+ uses collection.anki21b (zstd-compressed SQLite)
  const dbf21b = zip.file('collection.anki21b');
  const dbf    = zip.file('collection.anki21') || zip.file('collection.anki2');

  let dbBytes;
  if(dbf21b){
    // Load zstd-wasm from unpkg
    try{ await loadScript('https://unpkg.com/zstd-codec@0.1.4/lib/zstd-codec.js'); }
    catch(e){err('zstd-codec 로드 실패 (네트워크 확인)');$('colSettings').style.display='';return;}
    const compressed = new Uint8Array(await dbf21b.async('arraybuffer'));
    try{
      dbBytes = await new Promise((res,rej)=>{
        ZstdCodec.run(zstd=>{
          try{
            const simple = new zstd.Simple();
            res(simple.decompress(compressed));
          }catch(e){rej(e);}
        });
      });
    }catch(e){err('zstd 압축 해제 실패: '+e.message);$('colSettings').style.display='';return;}
  } else if(dbf){
    dbBytes = new Uint8Array(await dbf.async('arraybuffer'));
  } else {
    err('APKG에서 DB를 찾을 수 없습니다.');$('colSettings').style.display='';return;
  }

  let SQL;
  try{SQL=await initSqlJs({locateFile:()=>'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.wasm'});}
  catch(e){err('sql.js WASM 실패');$('colSettings').style.display='';return;}

  const db=new SQL.Database(dbBytes);
  const out=[];
  try{
    const res=db.exec("SELECT flds FROM notes LIMIT 3000");
    if(res.length&&res[0].values.length){
      for(const row of res[0].values){
        const p=row[0].split('\x1f');
        const q=stripHtml(p[0]||'').trim(),a=stripHtml(p[1]||'').trim();
        if(!q&&!a)continue;
        out.push({q,a,hint:stripHtml(p[2]||'').trim()});
      }
    }
  }catch(e){err('DB 쿼리 오류: '+e.message);}
  db.close();
  if(!out.length){err('카드를 찾을 수 없습니다.');$('colSettings').style.display='';return;}
  finish(out,'APKG');
}

/* ── finish parse ── */
function finish(c,fmt){
  if(!c.length){err('유효한 카드 없음');return;}
  cards=c;idx=0;side='q';
  $('cardBadge').textContent=c.length+'개';
  const tbody=$('tblBody');
  tbody.innerHTML='';
  const n=Math.min(c.length,10);
  for(let i=0;i<n;i++){
    const tr=document.createElement('tr');
    tr.dataset.idx=i;
    tr.innerHTML=`<td class="rn">${i+1}</td>
      <td title="${eh(c[i].q)}">${eh(c[i].q)}</td>
      <td title="${eh(c[i].a)}">${eh(c[i].a)}</td>
      <td title="${eh(c[i].hint)}">${eh(c[i].hint)||'—'}</td>`;
    tr.addEventListener('click',()=>{idx=i;side='q';render();hilite(i);});
    tbody.appendChild(tr);
  }
  if(c.length>10){
    const tr=document.createElement('tr');
    tr.innerHTML=`<td colspan="4" style="color:var(--muted);text-align:center;padding:8px">... 외 ${c.length-10}개</td>`;
    tbody.appendChild(tr);
  }
  $('previewWrap').classList.add('on');
  idx=-1; side='q';
  renderCover(); hilite(-1);
  $('cvtBtn').disabled=false;
  toast(`✓ ${fmt} — ${c.length}개 카드`);
}
function eh(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── Cover preview (idx = -1) ── */
function renderCover(){
  const title=($('bookTitle')||{value:'My Deck'}).value||'My Deck';
  const b64=generateCoverPng(title);
  const cvs=$('coverCanvas');
  cvs.width=900; cvs.height=1500;
  const img=new Image();
  img.onload=()=>{ cvs.getContext('2d').drawImage(img,0,0); };
  img.src='data:image/png;base64,'+b64;
  // Show canvas, hide text screen
  cvs.style.display='block';
  $('x4Screen').style.display='none';
  $('flipBtn').disabled=true;
  $('prevBtn').disabled=true;
  $('nextBtn').disabled=(cards.length===0);
  $('cardPos').textContent='표지';
}

/* ── divStyle / bookTitle listeners ── */
document.getElementById('divStyle').addEventListener('change', ()=>{ if(cards.length&&idx>=0) render(); });
document.getElementById('bookTitle').addEventListener('input', ()=>{
  if(!cards.length) return;
  if(idx===-1) renderCover(); else { render(); }
  // always regenerate cover b64 for EPUB (done at build time)
});

/* ── X4 card preview ── */
function render(){
  const c=cards[idx];
  if(!c) return;
  // Switch to text screen
  $('coverCanvas').style.display='none';
  $('x4Screen').style.display='';
  const num=String(idx+1).padStart(3,'0');
  const tot=String(cards.length).padStart(3,'0');
  const title=($('bookTitle')||{value:'My Deck'}).value||'My Deck';
  const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let html='';
  const sep=esc(divChar());
  const hdr=`${esc(title)} • <b>${num}/${tot}</b>`;

  if(side==='q'){
    html+=`${hdr}<br>`;
    html+=`${sep}<br>`;
    html+=`<b>[ Q. ]</b><br>`;
    html+=`<b>${esc(c.q||'')}</b><br>`;
    if(c.hint){
      html+=`${sep}<br>`;
      html+=`<b>[ Hint ]</b><br>`;
      html+=esc(c.hint);
    } else {
      html+=sep;
    }
  } else {
    html+=`${hdr}<br>`;
    html+=`${sep}<br>`;
    html+=`<b>[ Q. ]</b><br>`;
    html+=esc(c.q||'');
    html+=`<br>${sep}<br>`;
    html+=`<b>[ A. ]</b><br>`;
    html+=`<b>${esc(c.a||'')}</b>`;
  }

  $('x4Content').innerHTML=html;
  $('cardPos').textContent=`${idx+1}/${cards.length}`;
  $('prevBtn').disabled=false; // can always go back to cover
  $('nextBtn').disabled=idx===cards.length-1;
  $('flipBtn').disabled=false;
}
function divChar(){
  const v=($('divStyle')||{value:'dot'}).value;
  if(v==='dash') return'----------------------------';
  if(v==='eq')   return'===========================';
  return'..............................................';
}
function flipCard(){side=side==='q'?'a':'q';render();}
function navCard(dir){
  const n=idx+dir;
  if(n<-1||n>=cards.length)return;
  idx=n; side='q';
  if(idx===-1){ renderCover(); hilite(-1); return; }
  render();
  const row=$('tblBody').querySelector(`tr[data-idx="${n}"]`);
  if(row){hilite(n);row.scrollIntoView({block:'nearest'});}
}
function hilite(i){
  $('tblBody').querySelectorAll('tr').forEach(r=>r.classList.remove('sel'));
  const r=$('tblBody').querySelector(`tr[data-idx="${i}"]`);
  if(r)r.classList.add('sel');
}
document.addEventListener('keydown',e=>{
  if(!cards.length||e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.code==='Space'){e.preventDefault();if(idx>=0)flipCard();}
  if(e.code==='ArrowRight'){e.preventDefault();navCard(1);}
  if(e.code==='ArrowLeft'){e.preventDefault();navCard(-1);}
});

/* ── EPUB build ── */
$('cvtBtn').addEventListener('click',async()=>{
  if(!cards.length)return;
  $('cvtBtn').disabled=true;
  $('progBar').style.display='block';
  $('okBox').style.display='none';
  prog(5,'생성 중...');
  try{
    blob=await buildEPUB();
    prog(100,'완료!');
    setTimeout(()=>{$('progBar').style.display='none';$('status').textContent='';$('cvtBtn').disabled=false;showOK();},400);
  }catch(e){
    err('변환 실패: '+e.message);
    $('progBar').style.display='none';$('status').textContent='';$('cvtBtn').disabled=false;
  }
});

function xe(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* lines: string | {b:"bold text"} | {raw:"raw html"} | "" for blank */
function makePage(titleStr, lines){
  const body=lines.map(l=>{
    if(l===''||l===null||l===undefined) return '<p>&#160;</p>';
    if(typeof l==='object'&&l.raw!==undefined) return `<p>${l.raw}</p>`;
    // {b: text} → bold + center
    if(typeof l==='object'&&l.b!==undefined)
      return `<p style="text-align:center;"><b>${xe(l.b)}</b></p>`;
    // {bl: text} → bold + left
    if(typeof l==='object'&&l.bl!==undefined)
      return `<p><b>${xe(l.bl)}</b></p>`;
    // {c: text} → plain + center
    if(typeof l==='object'&&l.c!==undefined)
      return `<p style="text-align:center;">${xe(l.c)}</p>`;
    return `<p>${xe(l)}</p>`;
  }).join('\n');
  return `<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ko">
<head><meta http-equiv="Content-Type" content="application/xhtml+xml; charset=utf-8"/><title>${xe(titleStr)}</title></head>
<body style="margin:16px;">
${body}
</body>
</html>`;
}

/* ── Cover image generation (Canvas → PNG) ── */
function generateCoverPng(title){
  const W=900, H=1500;
  const canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');

  // White background
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,W,H);

  const cx=W/2;

  // ── Top "FlashCards" label ──
  ctx.fillStyle='#000';
  ctx.textAlign='center';
  ctx.textBaseline='alphabetic';
  ctx.font=`bold 72px sans-serif`;
  ctx.fillText('• FlashCards •', cx, 120);

  // ── Title, vertically centered in middle area ──
  const FONT_SIZE=110;
  ctx.font=`bold ${FONT_SIZE}px sans-serif`;

  // Word-wrap
  const words=title.split(/\s+/);
  const maxW=W-120;
  let tlines=[], cur='';
  for(const w of words){
    const test=cur?cur+' '+w:w;
    if(ctx.measureText(test).width>maxW&&cur){tlines.push(cur);cur=w;}
    else cur=test;
  }
  if(cur) tlines.push(cur);

  const lineH=FONT_SIZE+24;
  const totalTitleH=tlines.length*lineH;
  const titleAreaTop=170;
  const titleAreaH=H*0.82-titleAreaTop;
  const titleY=titleAreaTop+(titleAreaH-totalTitleH)/2+FONT_SIZE;

  ctx.font=`bold ${FONT_SIZE}px sans-serif`;
  ctx.textBaseline='alphabetic';
  tlines.forEach((ln,i)=>ctx.fillText(ln, cx, titleY+i*lineH));

  // ── Bottom black bar ──
  const barH=200;
  const barY=H-barH;
  ctx.fillStyle='#111';
  ctx.fillRect(0, barY, W, barH);

  // Card count centered in bar
  ctx.fillStyle='#ffffff';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.font=`bold 68px sans-serif`;
  ctx.fillText(`${cards.length} cards`, cx, barY+barH/2);

  return canvas.toDataURL('image/png').split(',')[1];
}


async function buildEPUB(){
  const zip=new JSZip();
  const title=$('bookTitle').value||'플래시카드';
  const author=$('bookAuthor').value||'FlashEPUB';
  const div=divChar();
  const uid='fe-'+Date.now();

  zip.file('mimetype','application/epub+zip',{compression:'STORE'});
  zip.folder('META-INF').file('container.xml',
`<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:schemas:container">
  <rootfiles>
    <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
  </rootfiles>
</container>`);

  const oebps=zip.folder('OEBPS');
  prog(10,'표지 생성 중...');

  // Cover PNG
  const coverB64=generateCoverPng(title);
  oebps.file('cover.png', coverB64, {base64:true});

  // Cover XHTML page
  const coverXhtml=`<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head><meta http-equiv="Content-Type" content="application/xhtml+xml; charset=utf-8"/><title>${xe(title)}</title></head>
<body style="margin:0;padding:0;text-align:center;">
<img src="cover.png" alt="${xe(title)}" style="width:100%;height:auto;"/>
</body>
</html>`;
  oebps.file('cover.xhtml', coverXhtml);

  prog(15,'페이지 생성 중...');

  const mf=[], sp=[];
  // cover in manifest + spine first
  mf.push({id:'cover-img', href:'cover.png', mt:'image/png', extra:' properties="cover-image"'});
  mf.push({id:'cover', href:'cover.xhtml', mt:'application/xhtml+xml', extra:''});
  sp.unshift('cover');

  for(let i=0;i<cards.length;i++){
    const c=cards[i];
    const num=String(i+1).padStart(3,'0');
    const tot=String(cards.length).padStart(3,'0');

    const hdrLine = `${title} • `;
    const hdrBold = `${num}/${tot}`;

    const sep = div || '..........................................';

    const qLines = [
      '',
      {c: sep},
      {b:'[ Q. ]'},
      {b: c.q || ''},
    ];
    if(c.hint){
      qLines.push({c: sep});
      qLines.push({bl:'[ Hint ]'});
      qLines.push(c.hint);
    } else {
      qLines.push({c: sep});
    }

    const aLines = [
      '',
      {c: sep},
      {b:'[ Q. ]'},
      {c: c.q || ''},
      {c: sep},
      {b:'[ A. ]'},
      {b: c.a || ''},
    ];

    const hdrRaw = `${xe(title)} • <b>${xe(hdrBold)}</b>`;
    qLines[0] = {raw: hdrRaw};
    aLines[0] = {raw: hdrRaw};

    oebps.file(`q${i+1}.xhtml`, makePage(`Q${num}`, qLines));
    oebps.file(`a${i+1}.xhtml`, makePage(`A${num}`, aLines));
    mf.push({id:`q${i+1}`,href:`q${i+1}.xhtml`,mt:'application/xhtml+xml',extra:''});
    mf.push({id:`a${i+1}`,href:`a${i+1}.xhtml`,mt:'application/xhtml+xml',extra:''});
    sp.push(`q${i+1}`,`a${i+1}`);

    if(i%30===0) prog(15+Math.floor(i/cards.length*65),`${i+1}/${cards.length}`);
  }

  prog(82,'메타데이터...');

  const mItems=mf.map(m=>`<item id="${m.id}" href="${m.href}" media-type="${m.mt}"${m.extra}/>`).join('\n    ');
  const sItems=sp.map(id=>`<itemref idref="${id}"/>`).join('\n    ');

  oebps.file('content.opf',
`<?xml version="1.0" encoding="UTF-8"?>
<package version="2.0" xmlns="http://www.idpf.org/2007/opf" unique-identifier="uid">
  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:opf="http://www.idpf.org/2007/opf">
    <dc:title>${xe(title)}</dc:title>
    <dc:creator>${xe(author)}</dc:creator>
    <dc:language>ko</dc:language>
    <dc:identifier id="uid">${uid}</dc:identifier>
    <meta name="cover" content="cover-img"/>
  </metadata>
  <manifest>
    <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>
    ${mItems}
  </manifest>
  <spine toc="ncx">
    ${sItems}
  </spine>
</package>`);

  const ncxNav=cards.map((c,i)=>`
    <navPoint id="n${i+1}" playOrder="${i+2}">
      <navLabel><text>${String(i+1).padStart(3,'0')}. ${xe(c.q.substring(0,40))}</text></navLabel>
      <content src="q${i+1}.xhtml"/>
    </navPoint>`).join('');

  oebps.file('toc.ncx',
`<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE ncx PUBLIC "-//NISO//DTD ncx 2005-1//EN" "http://www.daisy.org/z3986/2005/ncx-2005-1.dtd">
<ncx version="2005-1" xmlns="http://www.daisy.org/z3986/2005/ncx/">
  <head>
    <meta name="dtb:uid" content="${uid}"/>
    <meta name="dtb:depth" content="1"/>
    <meta name="dtb:totalPageCount" content="0"/>
    <meta name="dtb:maxPageNumber" content="0"/>
  </head>
  <docTitle><text>${xe(title)}</text></docTitle>
  <navMap>
    <navPoint id="n0" playOrder="1">
      <navLabel><text>표지</text></navLabel>
      <content src="cover.xhtml"/>
    </navPoint>${ncxNav}
  </navMap>
</ncx>`);

  prog(94,'압축 중...');
  return await zip.generateAsync({type:'blob',mimeType:'application/epub+zip'});
}

function showOK(){
  const t=$('bookTitle').value||'플래시카드';
  $('okSub').textContent=`"${t}" — ${cards.length}개 카드 · ${cards.length*2}페이지`;
  $('okBox').style.display='block';
  $('okBox').scrollIntoView({behavior:'smooth',block:'center'});
}

$('dlBtn').addEventListener('click',()=>{
  if(!blob)return;
  const safe=($('bookTitle').value||'flashcards').replace(/[^a-zA-Z0-9가-힣_\-]/g,'_');
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=safe+'.epub';a.click();
  URL.revokeObjectURL(url);
  toast('📥 다운로드 시작!');
});
</script>
